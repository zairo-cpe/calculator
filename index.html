<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
</head>
<body>
    <link rel="stylesheet" href="style.css">
    <div id="calculator">
        <div class="glass">
            <div id="calculatorBody">
                <div id="display">
                    <p id="resultText">0</p>
                    <button id="result" class="buttons">=</button>
                </div>
                <div id="controls">
                    <div id="numbers">
                        <div id="row1">
                            <button class="buttons">1</button>
                            <button class="buttons">2</button>
                            <button class="buttons">3</button>
                        </div>
                        
                        <div id="row2">
                            <button class="buttons">4</button>
                            <button class="buttons">5</button>
                            <button class="buttons">6</button>
                        </div>
                        
                        <div id="row3">
                            <button class="buttons">7</button>
                            <button class="buttons">8</button>
                            <button class="buttons">9</button>
                        </div>
                        
                        <div id="row4">
                            <button class="buttons">0</button>
                            <button id="clear" class="buttons">CLR</button>
                        </div>
                    
                    </div>
                    <div id="operators">
                        <button id="add" class="ops">+</button>
                        <button id="subtract" class="ops">-</button>
                        <button id="multiply" class="ops">*</button>
                        <button id="divide" class="ops">/</button>
                    </div>
                </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
